<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBDT - Card Maker Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { --primary: #b91c1c; --grad: linear-gradient(135deg, #d32f2f, #8e0000); }
        body { font-family: 'Anek Bangla', sans-serif; background: #f0f2f5; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .header-bar { width: 100%; background: #b91c1c; color: white; text-align: center; padding: 12px 0; font-weight: 800; font-size: 18px; }
        .container { display: flex; flex-wrap: wrap; width: 100%; max-width: 1100px; justify-content: center; padding: 15px; box-sizing: border-box; gap: 15px; }
        
        .editor-panel { width: 100%; max-width: 380px; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-weight: 700; margin-bottom: 3px; color: #444; font-size: 12px; }
        .input-group input, .input-group select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-family: 'Anek Bangla'; font-size: 14px; outline: none; box-sizing: border-box; }
        
        .btn-download { width: 100%; padding: 12px; background: #16a34a; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 16px; margin-top: 10px; }
        .btn-share { width: 100%; padding: 10px; background: #3b5998; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 14px; margin-top: 8px; }
        
        /* ৪:৫ রেশিও */
        .card { width: 420px; height: 530px; background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 4px solid var(--primary); position: relative; display: flex; flex-direction: column; }
        
        .milestone-label { position: absolute; top: 0; left: 0; background: rgba(0,0,0,0.7); color: white; padding: 5px 15px; font-size: 10px; font-weight: 800; border-bottom-right-radius: 15px; z-index: 10; backdrop-filter: blur(4px); }
        
        /* হেডার - নাম ও স্থাপিত তারিখ */
        .header { background: var(--grad); padding: 25px 15px 50px 15px; display: flex; align-items: center; justify-content: space-between; color: white; position: relative; z-index: 2; box-sizing: border-box; }
        .header-text { flex: 1; text-align: left; }
        .header h1 { font-size: 19px; margin: 0; line-height: 1.2; word-wrap: break-word; }
        .established { font-size: 10px; font-weight: 600; opacity: 0.9; margin-top: 2px; display: block; }
        .top-corner-logo { width: 55px; height: 55px; object-fit: contain; flex-shrink: 0; }
        
        .watermark { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); width: 200px; opacity: 0.08; z-index: 1; pointer-events: none; filter: grayscale(1); }
        
        .card-body { padding: 0 25px; text-align: center; position: relative; z-index: 3; flex-grow: 1; }
        .img-area { margin-top: -45px; margin-bottom: 10px; position: relative; }
        .donor-img { width: 130px; height: 130px; border-radius: 18px; border: 5px solid #fff; object-fit: cover; background: #eee; }
        
        .blood-drop { position: absolute; right: 82px; bottom: 5px; width: 40px; height: 48px; background: #ff0000; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; transform: rotate(-45deg); display: flex; align-items: center; justify-content: center; border: 3px solid #fff; }
        .blood-drop span { transform: rotate(45deg); color: white; font-weight: 800; font-size: 12px; margin-top: 4px; margin-left: 4px; }
        
        .badge { background: #16a34a; color: white; padding: 4px 15px; border-radius: 6px; font-size: 12px; font-weight: 800; margin-top: -12px; display: inline-block; position: relative; z-index: 4; }
        
        .info-table { width: 100%; margin-top: 8px; border-collapse: collapse; }
        .info-table td { padding: 6px 0; border-bottom: 1px dashed #eee; font-size: 15px; }
        .label { color: var(--primary); font-weight: 700; text-align: left; }
        .value { color: #111; font-weight: 600; text-align: right; }
        
        .bottom-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; border-top: 1px solid #eee; padding-top: 8px; }
        .slogan-box { font-size: 14px; font-weight: 700; color: #555; font-style: italic; text-align: left; flex: 1; }
        .qr-area { width: 50px; height: 50px; background: #fff; padding: 2px; border: 1px solid #ddd; border-radius: 4px; flex-shrink: 0; margin-left: 10px; }
        
        .footer { background: #111; color: #fff; padding: 8px; font-size: 12px; text-align: center; font-weight: 700; }
        
        @media (max-width: 500px) { .card { transform: scale(0.8); margin: -50px 0; } }
    </style>
</head>
<body>

    <div class="header-bar" id="topBar">KBDT কার্ড মেকার প্রো</div>

    <div class="container">
        <div class="editor-panel">
            <div class="input-group">
                <label>রক্তদান সংখ্যা</label>
                <select id="inCountNum" onchange="checkAutoColor()">
                    <script>
                        for(let i=1; i<=100; i++) document.write(`<option value="${i}">${i} বার</option>`);
                    </script>
                </select>
            </div>
            <div class="input-group"><label>সেবা নম্বর</label><input type="text" id="inSebaNo" value="১১০৯" oninput="updateCard()"></div>
            <div class="input-group"><label>দাতার নাম</label><input type="text" id="inName" placeholder="দাতার নাম" oninput="updateCard()"></div>
            <div class="input-group"><label>রক্তের গ্রুপ</label><select id="inGroup" onchange="updateCard()">
                <option value="A+">A+</option><option value="B+">B+</option><option value="O+">O+</option><option value="AB+">AB+</option>
                <option value="A-">A-</option><option value="B-">B-</option><option value="O-">O-</option><option value="AB-">AB-</option>
            </select></div>
            <div class="input-group"><label>রক্তদানের স্থান</label><input type="text" id="inPlace" placeholder="হাসপাতাল" oninput="updateCard()"></div>
            <div class="input-group"><label>রক্তদানের তারিখ</label><input type="text" id="inDate" oninput="updateCard()"></div>
            <div class="input-group"><label style="color:#ff0000;">দাতার ছবি *</label><input type="file" accept="image/*" onchange="loadFile(event, 'cardImg')"></div>
            <div class="input-group"><label style="color:#16a34a;">লোগো ও ওয়াটারমার্ক</label><input type="file" accept="image/*" onchange="loadLogo(event)"></div>

            <button class="btn-download" onclick="downloadImage()">ডাউনলোড কার্ড</button>
            <button class="btn-share" onclick="shareApp()">লিঙ্ক শেয়ার/কপি করুন</button>
        </div>

        <div id="captureArea" class="card">
            <div id="milestoneText" class="milestone-label">New Donor | ১-৪ বার</div>
            <div class="header" id="cardHeader">
                <div class="header-text">
                    <h1>কাশীনগর ব্লাড ডোনেশন টিম</h1>
                    <span class="established">স্থাপিত: ০২ ফেব্রুয়ারি ২০২০</span>
                </div>
                <img id="cardCornerLogo" src="https://i.ibb.co/L5rK3jC/logo.png" class="top-corner-logo">
            </div>
            <img id="cardWatermark" src="https://i.ibb.co/L5rK3jC/logo.png" class="watermark">
            <div class="card-body">
                <div class="img-area">
                    <img id="cardImg" src="https://via.placeholder.com/150" class="donor-img">
                    <div class="blood-drop"><span id="dropText">A+</span></div>
                </div>
                <div class="badge" id="cardSebaDisplay">সেবা নম্বর: ১১০৯ তম</div>
                <table class="info-table">
                    <tr><td class="label">রক্তদাতা</td><td class="value" id="cardName">দাতার নাম</td></tr>
                    <tr><td class="label">রক্তদান নং</td><td class="value" id="cardCountDisplay">১ বার</td></tr>
                    <tr><td class="label">স্থান ও তারিখ</td><td class="value"><span id="cardPlace">স্থান</span> | <small id="cardDate">তারিখ</small></td></tr>
                </table>
                <div class="bottom-row">
                    <div class="slogan-box">"মানবতার শ্রেষ্ঠদান, স্বেচ্ছায় করবো রক্তদান"</div>
                    <div class="qr-area" id="qrcode"></div>
                </div>
            </div>
            <div class="footer">রক্ত দিন, জীবন বাঁচান - KBDT</div>
        </div>
    </div>

    <script>
        const enToBn = {'0':'০','1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯','/':'/','-':'-'};
        function toBn(s) { return s.toString().replace(/[0-9\/\-]/g, m => enToBn[m] || m); }

        let qrcode = new QRCode(document.getElementById("qrcode"), { width: 50, height: 50 });

        window.onload = function() {
            let d = new Date();
            document.getElementById('inDate').value = d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear();
            checkAutoColor();
            updateQR();
        };

        function updateQR() {
            qrcode.clear();
            qrcode.makeCode(window.location.href);
        }

        function setTheme(main, grad, label) {
            document.getElementById('captureArea').style.borderColor = main;
            document.getElementById('cardHeader').style.background = grad;
            document.getElementById('topBar').style.background = main;
            document.getElementById('milestoneText').innerText = label;
            document.querySelectorAll('.label').forEach(el => el.style.color = main);
        }

        function checkAutoColor() {
            const count = parseInt(document.getElementById('inCountNum').value);
            if(count >= 1 && count <= 4) setTheme("#b91c1c", "linear-gradient(135deg, #d32f2f, #8e0000)", "New Donor | ১-৪ বার");
            else if(count >= 5 && count <= 9) setTheme("#1d4ed8", "linear-gradient(135deg, #3b82f6, #1d4ed8)", "Regular Donor | ৫-৯ বার");
            else if(count >= 10 && count <= 19) setTheme("#0f766e", "linear-gradient(135deg, #14b8a6, #0f766e)", "Active Donor | ১০-১৯ বার");
            else if(count >= 20 && count <= 29) setTheme("#6d28d9", "linear-gradient(135deg, #8b5cf6, #6d28d9)", "Dedicated Donor | ২০-২৯ বার");
            else if(count >= 30 && count <= 39) setTheme("#be185d", "linear-gradient(135deg, #ec4899, #be185d)", "Super Donor | ৩০-৩৯ বার");
            else if(count >= 40 && count <= 49) setTheme("#111827", "linear-gradient(135deg, #4b5563, #111827)", "Elite Donor | ৪০-৪৯ বার");
            else if(count >= 50) setTheme("#854d0e", "linear-gradient(135deg, #eab308, #854d0e)", "Century Donor | ৫০+ বার");
            updateCard();
        }

        function loadFile(e, id) { var r = new FileReader(); r.onload = function(){ document.getElementById(id).src = r.result; }; r.readAsDataURL(e.target.files[0]); }
        function loadLogo(e) { var r = new FileReader(); r.onload = function(){ document.getElementById('cardCornerLogo').src = r.result; document.getElementById('cardWatermark').src = r.result; }; r.readAsDataURL(e.target.files[0]); }

        function updateCard() {
            document.getElementById('cardName').innerText = document.getElementById('inName').value || "দাতার নাম";
            document.getElementById('dropText').innerText = document.getElementById('inGroup').value;
            document.getElementById('cardDate').innerText = toBn(document.getElementById('inDate').value);
            document.getElementById('cardPlace').innerText = document.getElementById('inPlace').value || "হাসপাতাল";
            document.getElementById('cardSebaDisplay').innerText = "সেবা নম্বর: " + toBn(document.getElementById('inSebaNo').value) + " তম";
            document.getElementById('cardCountDisplay').innerText = toBn(document.getElementById('inCountNum').value) + " বার";
        }

        function downloadImage() {
            html2canvas(document.querySelector("#captureArea"), { scale: 3, useCORS: true }).then(canvas => {
                const link = document.createElement('a'); link.download = `KBDT_Card.png`; link.href = canvas.toDataURL(); link.click();
            });
        }

        function shareApp() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({ title: 'KBDT কার্ড মেকার', url: url }).catch(err => copyToClipboard(url));
            } else {
                copyToClipboard(url);
            }
        }

        function copyToClipboard(text) {
            const dummy = document.createElement("input");
            document.body.appendChild(dummy);
            dummy.value = text;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);
            alert("অ্যাপের লিঙ্কটি কপি হয়েছে!");
        }
    </script>
</body>
</html>
